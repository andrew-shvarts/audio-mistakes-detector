services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads:/data/uploads
      - whisper-cache:/home/appuser/.cache
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: celery -A src.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
      - whisper-cache:/home/appuser/.cache
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  uploads:
  whisper-cache:
